<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uzay Gemisi Toplama Oyunu 🚀</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@400;700;800;900&display=swap');

  :root {
    --space-dark: #020818;
    --space-deep: #050d2e;
    --neon-blue: #00d4ff;
    --neon-green: #39ff14;
    --neon-yellow: #ffe600;
    --neon-pink: #ff2d78;
    --neon-orange: #ff6b00;
    --star-white: #ffffff;
    --asteroid-brown: #c87941;
    --asteroid-dark: #7a4a25;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--space-dark);
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  @media (hover: hover) {
    body { cursor: none; }
  }
  @media (hover: none) {
    #crosshair { display: none !important; }
  }

  /* STARFIELD */
  #starfield {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.1; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1.2); }
  }

  /* NEBULA BG */
  .nebula {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(72, 0, 120, 0.3) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0, 60, 120, 0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(0, 100, 80, 0.2) 0%, transparent 40%);
    z-index: 0;
    pointer-events: none;
  }

  /* GAME CONTAINER */
  #game {
    position: relative;
    width: 100vw;
    height: 100vh;
    z-index: 1;
  }

  /* HUD */
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
    z-index: 100;
  }

  .hud-item {
    font-family: 'Orbitron', monospace;
    color: var(--neon-blue);
    font-size: 14px;
    text-shadow: 0 0 10px var(--neon-blue);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .hud-label {
    font-size: 10px;
    color: rgba(0, 212, 255, 0.6);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .hud-value {
    font-size: 22px;
    font-weight: 900;
    color: var(--neon-yellow);
    text-shadow: 0 0 15px var(--neon-yellow);
  }

  /* QUESTION DISPLAY */
  #question-area {
    position: absolute;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 100;
  }

  #question-text {
    font-family: 'Orbitron', monospace;
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 900;
    color: white;
    text-shadow:
      0 0 20px var(--neon-blue),
      0 0 40px var(--neon-blue),
      0 0 80px rgba(0,212,255,0.5);
    letter-spacing: 4px;
    animation: questionPulse 2s ease-in-out infinite;
  }

  @keyframes questionPulse {
    0%, 100% { text-shadow: 0 0 20px var(--neon-blue), 0 0 40px var(--neon-blue); }
    50% { text-shadow: 0 0 30px var(--neon-blue), 0 0 60px var(--neon-blue), 0 0 100px var(--neon-blue); }
  }

  #question-hint {
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    color: rgba(255,255,255,0.6);
    margin-top: 8px;
    letter-spacing: 1px;
  }

  /* ASTEROIDS */
  .asteroid {
    position: absolute;
    cursor: none;
    transition: transform 0.1s;
    z-index: 50;
    animation: asteroidFloat var(--float-dur) ease-in-out infinite alternate;
  }

  .asteroid:hover .asteroid-body {
    filter: brightness(1.3) drop-shadow(0 0 15px var(--neon-yellow));
    transform: scale(1.05);
  }

  @keyframes asteroidFloat {
    from { transform: translateY(0px) rotate(var(--rot-start)); }
    to { transform: translateY(-15px) rotate(var(--rot-end)); }
  }

  .asteroid-body {
    position: relative;
    transition: all 0.2s;
  }

  .asteroid-number {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    color: white;
    text-shadow: 0 0 10px rgba(0,0,0,0.8), 2px 2px 4px rgba(0,0,0,0.9);
    pointer-events: none;
    z-index: 2;
  }

  /* SPACESHIP - now at top, flipped upside down */
  #spaceship {
    position: absolute;
    top: 75px;
    left: 50%;
    transform: translateX(-50%) scaleY(-1);
    z-index: 60;
    filter: drop-shadow(0 0 20px var(--neon-blue));
    transition: left 0.05s;
    pointer-events: none;
  }

  /* LASER */
  .laser {
    position: absolute;
    width: 4px;
    background: linear-gradient(0deg, transparent, var(--neon-green), white);
    border-radius: 4px;
    z-index: 55;
    box-shadow: 0 0 8px var(--neon-green), 0 0 20px var(--neon-green);
    pointer-events: none;
    animation: laserMove 0.4s linear forwards;
  }

  @keyframes laserMove {
    from { opacity: 1; }
    to { opacity: 0; transform: scaleY(0.5); }
  }

  /* EXPLOSION */
  .explosion {
    position: absolute;
    pointer-events: none;
    z-index: 70;
    animation: explode 0.6s ease-out forwards;
  }

  @keyframes explode {
    0% { transform: scale(0); opacity: 1; }
    50% { transform: scale(1.5); opacity: 1; }
    100% { transform: scale(2); opacity: 0; }
  }

  .exp-particle {
    position: absolute;
    border-radius: 50%;
    animation: particle var(--dur) ease-out forwards;
  }

  @keyframes particle {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }

  /* WRONG FLASH */
  .wrong-flash {
    position: fixed;
    inset: 0;
    background: rgba(255, 0, 0, 0.3);
    z-index: 200;
    animation: wrongFlash 0.4s ease-out forwards;
    pointer-events: none;
  }

  @keyframes wrongFlash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* BREAKING HEART */
  #heart-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 250;
    pointer-events: none;
    display: none;
  }

  #heart-container.active { display: block; }

  .heart-half {
    position: absolute;
    font-size: 120px;
    line-height: 1;
    filter: drop-shadow(0 0 20px rgba(255,45,120,0.9));
    top: 0;
  }

  #heart-left {
    left: 0;
    transform-origin: right center;
    clip-path: inset(0 50% 0 0);
  }

  #heart-right {
    left: 0;
    transform-origin: left center;
    clip-path: inset(0 0 0 50%);
  }

  /* Phase 1: big heart appears */
  .heart-appear {
    animation: heartAppear 0.35s ease-out forwards;
  }
  @keyframes heartAppear {
    0%   { transform: scale(0) rotate(0deg); opacity: 0; }
    60%  { transform: scale(1.3) rotate(-5deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  /* Phase 2: crack shiver */
  .heart-crack {
    animation: heartCrack 0.25s ease-in-out forwards;
  }
  @keyframes heartCrack {
    0%   { transform: scale(1) rotate(0deg); }
    25%  { transform: scale(1.05) rotate(-3deg); }
    50%  { transform: scale(1.05) rotate(3deg); }
    75%  { transform: scale(1) rotate(-2deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  /* Phase 3 left half flies away */
  .heart-break-left {
    animation: breakLeft 0.55s ease-in forwards;
  }
  @keyframes breakLeft {
    0%   { clip-path: inset(0 50% 0 0); transform: translate(0,0) rotate(0deg); opacity: 1; }
    100% { clip-path: inset(0 50% 0 0); transform: translate(-160px, 120px) rotate(-40deg); opacity: 0; }
  }

  /* Phase 3 right half flies to HUD heart */
  .heart-break-right {
    animation: breakRight 0.55s ease-in forwards;
  }
  @keyframes breakRight {
    0%   { clip-path: inset(0 0 0 50%); transform: translate(0,0) rotate(0deg); opacity: 1; }
    100% { clip-path: inset(0 0 0 50%); transform: translate(140px, -300px) rotate(35deg) scale(0.15); opacity: 0.4; }
  }

  /* CORRECT FLASH */
  .correct-flash {
    position: fixed;
    inset: 0;
    background: rgba(57, 255, 20, 0.2);
    z-index: 200;
    animation: correctFlash 0.4s ease-out forwards;
    pointer-events: none;
  }

  @keyframes correctFlash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* FLOATING SCORE */
  .float-score {
    position: absolute;
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 28px;
    color: var(--neon-green);
    text-shadow: 0 0 15px var(--neon-green);
    pointer-events: none;
    z-index: 80;
    animation: floatUp 1s ease-out forwards;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
  }

  /* SCREENS */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 300;
    background: rgba(2, 8, 24, 0.95);
    backdrop-filter: blur(10px);
  }

  .screen.hidden { display: none; }

  .screen-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 900;
    color: var(--neon-yellow);
    text-shadow: 0 0 30px var(--neon-yellow), 0 0 60px rgba(255,230,0,0.5);
    text-align: center;
    line-height: 1.2;
    margin-bottom: 20px;
    animation: titleGlow 2s ease-in-out infinite alternate;
  }

  @keyframes titleGlow {
    from { text-shadow: 0 0 20px var(--neon-yellow); }
    to { text-shadow: 0 0 40px var(--neon-yellow), 0 0 80px var(--neon-yellow); }
  }

  .screen-subtitle {
    font-family: 'Nunito', sans-serif;
    font-size: clamp(18px, 2.5vw, 28px);
    color: rgba(255,255,255,0.8);
    text-align: center;
    margin-bottom: 40px;
    line-height: 1.6;
  }

  .btn {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--space-dark);
    background: linear-gradient(135deg, var(--neon-yellow), var(--neon-orange));
    border: none;
    padding: 18px 50px;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    box-shadow: 0 0 30px rgba(255,230,0,0.5), 0 8px 32px rgba(0,0,0,0.4);
    transition: all 0.2s;
    margin: 8px;
  }

  .btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 0 50px rgba(255,230,0,0.8), 0 12px 40px rgba(0,0,0,0.5);
  }

  .btn:active { transform: translateY(0) scale(0.98); }

  .btn-secondary {
    background: linear-gradient(135deg, var(--neon-blue), #0055aa);
    color: white;
    box-shadow: 0 0 30px rgba(0,212,255,0.4);
  }

  /* SCORE DISPLAY */
  .final-score {
    font-family: 'Orbitron', monospace;
    font-size: clamp(48px, 8vw, 100px);
    font-weight: 900;
    color: var(--neon-green);
    text-shadow: 0 0 40px var(--neon-green);
    margin: 20px 0;
  }

  .stars-display {
    font-size: 50px;
    margin: 10px 0 30px;
    animation: starsIn 0.5s ease-out;
  }

  @keyframes starsIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  /* LIVES */
  #lives {
    display: flex;
    gap: 8px;
  }

  .life-heart {
    font-size: 24px;
    transition: all 0.3s;
    filter: drop-shadow(0 0 8px rgba(255,45,120,0.8));
  }

  .life-heart.lost {
    opacity: 0.2;
    filter: grayscale(1);
  }

  /* PROGRESS BAR */
  #progress-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--neon-blue), var(--neon-green));
    box-shadow: 0 0 10px var(--neon-blue);
    transition: width 0.3s ease;
    z-index: 100;
  }

  /* LEVEL UP */
  .level-up {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Orbitron', monospace;
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 900;
    color: var(--neon-yellow);
    text-shadow: 0 0 40px var(--neon-yellow);
    z-index: 200;
    pointer-events: none;
    animation: levelUpAnim 1.5s ease-out forwards;
    text-align: center;
  }

  @keyframes levelUpAnim {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    30% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    70% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    100% { transform: translate(-50%, -60%) scale(0.8); opacity: 0; }
  }

  /* CURSOR CROSSHAIR */
  #crosshair {
    position: fixed;
    pointer-events: none;
    z-index: 400;
    transform: translate(-50%, -50%);
  }

  /* SPEED INDICATOR */
  #speed-bar {
    position: absolute;
    top: 75px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    z-index: 100;
  }

  .speed-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.3s;
  }

  .speed-dot.active {
    background: var(--neon-green);
    box-shadow: 0 0 8px var(--neon-green);
  }

  /* Rocket exhaust */
  @keyframes exhaustFlicker {
    0%, 100% { transform: scaleY(1) scaleX(1); opacity: 0.9; }
    50% { transform: scaleY(1.2) scaleX(0.8); opacity: 0.7; }
  }

  @keyframes asteroidFloat {
    from { transform: translateY(0px); }
    to   { transform: translateY(-15px); }
  }

  @keyframes laserFade {
    0%   { opacity: 1; }
    70%  { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>

<!-- Stars -->
<div class="nebula"></div>
<div id="starfield"></div>

<!-- Custom cursor -->
<svg id="crosshair" width="40" height="40" viewBox="0 0 40 40">
  <circle cx="20" cy="20" r="16" fill="none" stroke="rgba(255,230,0,0.8)" stroke-width="1.5"/>
  <circle cx="20" cy="20" r="3" fill="var(--neon-yellow)"/>
  <line x1="20" y1="2" x2="20" y2="10" stroke="var(--neon-yellow)" stroke-width="1.5"/>
  <line x1="20" y1="30" x2="20" y2="38" stroke="var(--neon-yellow)" stroke-width="1.5"/>
  <line x1="2" y1="20" x2="10" y2="20" stroke="var(--neon-yellow)" stroke-width="1.5"/>
  <line x1="30" y1="20" x2="38" y2="20" stroke="var(--neon-yellow)" stroke-width="1.5"/>
</svg>

<!-- START SCREEN -->
<div class="screen" id="startScreen">
  <div class="screen-title">🚀 UZAY GEMİSİ</div>
  <div class="screen-subtitle">
    Toplama işleminin doğru cevabını bul!<br>
    Doğru asteroiti vur ve puan kazan! ⭐
  </div>
  <div style="font-size:80px; margin: 10px 0; animation: asteroidFloat 2s ease-in-out infinite alternate;" >🪨</div>
  <button class="btn" onclick="startGame()">🚀 OYUNA BAŞLA</button>
  <div style="color: rgba(255,255,255,0.4); font-size:14px; margin-top:20px; font-family: Orbitron;">
    Sayılar: 0–20 arası toplama
  </div>
</div>

<!-- GAME OVER SCREEN -->
<div class="screen hidden" id="gameOverScreen">
  <div class="screen-title" id="gameOverTitle">OYUN BİTTİ!</div>
  <div id="starsDisplay" class="stars-display"></div>
  <div class="final-score" id="finalScore">0</div>
  <div class="screen-subtitle" id="gameOverMsg">Harika iş çıkardın! 🌟</div>
  <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
    <button class="btn" onclick="startGame()">🔄 TEKRAR OYNA</button>
    <button class="btn btn-secondary" onclick="showStart()">🏠 ANA EKRAN</button>
  </div>
</div>

<!-- MAIN GAME -->
<div id="game">
  <div id="hud">
    <div class="hud-item">
      <span class="hud-label">PUAN</span>
      <span class="hud-value" id="scoreDisplay">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">CANLAR</span>
      <div id="lives">
        <span class="life-heart" id="h1">❤️</span>
        <span class="life-heart" id="h2">❤️</span>
        <span class="life-heart" id="h3">❤️</span>
      </div>
    </div>
    <div class="hud-item">
      <span class="hud-label">SORU</span>
      <span class="hud-value" id="questionCount">1/10</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">SEVİYE</span>
      <span class="hud-value" id="levelDisplay">1</span>
    </div>
  </div>

  <div id="question-area">
    <div id="question-text">? + ? = ?</div>
    <div id="question-hint">Doğru asteroiti vur! 🎯</div>
  </div>

  <!-- Breaking Heart -->
  <div id="heart-container">
    <div id="heart-whole" style="position:relative; width:130px; height:130px;">
      <div class="heart-half" id="heart-left">💔</div>
      <div class="heart-half" id="heart-right">💔</div>
    </div>
  </div>

  <!-- Spaceship SVG -->
  <div id="spaceship">
    <svg width="60" height="90" viewBox="0 0 60 90">
      <!-- Exhaust flame -->
      <ellipse cx="30" cy="85" rx="10" ry="12" fill="rgba(255,107,0,0.8)" style="animation: exhaustFlicker 0.15s ease-in-out infinite;"/>
      <ellipse cx="30" cy="88" rx="6" ry="8" fill="rgba(255,230,0,0.9)" style="animation: exhaustFlicker 0.12s ease-in-out infinite reverse;"/>
      <!-- Body -->
      <path d="M30 2 L50 65 L30 55 L10 65 Z" fill="url(#shipGrad)"/>
      <!-- Cockpit -->
      <ellipse cx="30" cy="25" rx="10" ry="14" fill="url(#cockpitGrad)"/>
      <!-- Wings -->
      <path d="M10 65 L2 80 L22 70 Z" fill="#1a3a6e"/>
      <path d="M50 65 L58 80 L38 70 Z" fill="#1a3a6e"/>
      <!-- Engine glow -->
      <ellipse cx="30" cy="65" rx="10" ry="5" fill="rgba(0,212,255,0.6)"/>
      <!-- Stripe -->
      <path d="M22 45 L38 45 L40 55 L20 55 Z" fill="rgba(0,212,255,0.3)"/>
      <defs>
        <linearGradient id="shipGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#1a3a8f"/>
          <stop offset="50%" style="stop-color:#2a5fd4"/>
          <stop offset="100%" style="stop-color:#1a3a8f"/>
        </linearGradient>
        <radialGradient id="cockpitGrad">
          <stop offset="0%" style="stop-color:#a0e0ff"/>
          <stop offset="100%" style="stop-color:#2a8fd4"/>
        </radialGradient>
      </defs>
    </svg>
  </div>

  <div id="progress-bar" style="width:0%"></div>
</div>

<script>
// ===== STAR FIELD =====
const starfield = document.getElementById('starfield');
for (let i = 0; i < 200; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%; top:${Math.random()*100}%;
    --dur:${Math.random()*3+1}s;
    animation-delay:${Math.random()*3}s;
  `;
  starfield.appendChild(s);
}

// ===== CURSOR =====
const crosshair = document.getElementById('crosshair');
document.addEventListener('mousemove', e => {
  crosshair.style.left = e.clientX + 'px';
  crosshair.style.top = e.clientY + 'px';
});

// ===== GAME STATE =====
let score = 0;
let lives = 3;
let questionNum = 0;
let totalQuestions = 10;
let currentAnswer = 0;
let gameActive = false;
let level = 1;
let asteroids = [];
let correctAsteroid = null;

// ===== QUESTION GENERATOR =====
function generateQuestion() {
  // Based on level, increase difficulty
  let maxNum = level <= 1 ? 9 : level <= 2 ? 14 : 18;
  let a, b;
  do {
    a = Math.floor(Math.random() * (maxNum + 1));
    b = Math.floor(Math.random() * (maxNum + 1));
  } while (a + b > 20 || a + b < 2);
  return { a, b, answer: a + b };
}

// ===== GENERATE WRONG ANSWERS =====
function generateChoices(correct) {
  const choices = new Set([correct]);
  while (choices.size < 4) {
    let wrong = correct + (Math.floor(Math.random() * 7) - 3);
    if (wrong > 0 && wrong <= 20 && wrong !== correct) {
      choices.add(wrong);
    }
  }
  return [...choices].sort(() => Math.random() - 0.5);
}

// ===== ASTEROID SVG =====
function createAsteroidSVG(size, colorSeed) {
  const colors = [
    ['#c87941','#7a4a25','#e8a060'],
    ['#8b6b9e','#5a3a72','#b090c0'],
    ['#4a8b6e','#2a5a45','#70b090'],
    ['#8b4a4a','#5a2a2a','#c07070'],
  ];
  const [mid, dark, light] = colors[colorSeed % colors.length];
  // Irregular shape
  const pts = [];
  const n = 10;
  for (let i = 0; i < n; i++) {
    const angle = (i / n) * Math.PI * 2;
    const r = (0.7 + Math.random() * 0.3) * size / 2;
    pts.push([size/2 + r * Math.cos(angle), size/2 + r * Math.sin(angle)]);
  }
  const path = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ') + 'Z';
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <path d="${path}" fill="${mid}" stroke="${dark}" stroke-width="2"/>
    <circle cx="${size*0.3}" cy="${size*0.3}" r="${size*0.08}" fill="${dark}" opacity="0.6"/>
    <circle cx="${size*0.6}" cy="${size*0.5}" r="${size*0.05}" fill="${dark}" opacity="0.5"/>
    <circle cx="${size*0.35}" cy="${size*0.65}" r="${size*0.06}" fill="${dark}" opacity="0.4"/>
    <ellipse cx="${size*0.4}" cy="${size*0.35}" rx="${size*0.07}" ry="${size*0.04}" fill="${light}" opacity="0.4" transform="rotate(-30, ${size*0.4}, ${size*0.35})"/>
  </svg>`;
}

// ===== SPAWN ASTEROIDS =====
function spawnAsteroids(choices, correct) {
  // Clear old asteroids
  asteroids.forEach(a => a.el && a.el.remove());
  asteroids = [];

  const gameEl = document.getElementById('game');
  const positions = [
    { x: 8,  y: 68 },
    { x: 30, y: 72 },
    { x: 55, y: 68 },
    { x: 78, y: 72 },
  ].sort(() => Math.random() - 0.5);

  choices.forEach((num, i) => {
    const pos = positions[i];
    const size = 110 + Math.floor(Math.random() * 30);
    const el = document.createElement('div');
    el.className = 'asteroid';
    const rotStart = Math.random() * 10 - 5;
    const rotEnd = rotStart + (Math.random() * 10 - 5);
    el.style.cssText = `
      left: ${pos.x}%;
      top: ${pos.y}%;
      --float-dur: ${2.5 + Math.random() * 2}s;
      --rot-start: ${rotStart}deg;
      --rot-end: ${rotEnd}deg;
    `;

    el.innerHTML = `
      <div class="asteroid-body" style="position:relative; width:${size}px; height:${size}px;">
        ${createAsteroidSVG(size, i)}
        <div class="asteroid-number" style="font-size:${size * 0.28}px;">${num}</div>
      </div>
    `;

    el.addEventListener('click', (e) => {
      e.preventDefault();
      handleShot(num, correct, el, pos, e.clientX, e.clientY);
    });
    el.addEventListener('touchend', (e) => {
      e.preventDefault();
      const t = e.changedTouches[0];
      handleShot(num, correct, el, pos, t.clientX, t.clientY);
    });
    gameEl.appendChild(el);
    asteroids.push({ el, num });

    if (num === correct) correctAsteroid = el;
  });
}

// ===== LASER =====
function fireLaser(targetX, targetY) {
  const ship = document.getElementById('spaceship');
  const shipRect = ship.getBoundingClientRect();

  const startX = shipRect.left + shipRect.width / 2;
  const startY = shipRect.bottom;

  // Use SVG for a perfect straight line — no transform math needed
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.style.cssText = `
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 55;
    overflow: visible;
  `;

  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  const grad = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
  grad.setAttribute('id', 'laserGrad');
  grad.setAttribute('gradientUnits', 'userSpaceOnUse');
  grad.setAttribute('x1', startX); grad.setAttribute('y1', startY);
  grad.setAttribute('x2', targetX); grad.setAttribute('y2', targetY);
  const s1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
  s1.setAttribute('offset', '0%'); s1.setAttribute('stop-color', 'white');
  const s2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
  s2.setAttribute('offset', '60%'); s2.setAttribute('stop-color', '#39ff14');
  const s3 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
  s3.setAttribute('offset', '100%'); s3.setAttribute('stop-color', 'transparent');
  grad.appendChild(s1); grad.appendChild(s2); grad.appendChild(s3);
  defs.appendChild(grad);
  svg.appendChild(defs);

  // Glow line (thick)
  const glow = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  glow.setAttribute('x1', startX); glow.setAttribute('y1', startY);
  glow.setAttribute('x2', targetX); glow.setAttribute('y2', targetY);
  glow.setAttribute('stroke', '#39ff14');
  glow.setAttribute('stroke-width', '10');
  glow.setAttribute('stroke-opacity', '0.3');
  glow.setAttribute('stroke-linecap', 'round');

  // Core line (sharp)
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', startX); line.setAttribute('y1', startY);
  line.setAttribute('x2', targetX); line.setAttribute('y2', targetY);
  line.setAttribute('stroke', 'url(#laserGrad)');
  line.setAttribute('stroke-width', '3');
  line.setAttribute('stroke-linecap', 'round');

  svg.appendChild(glow);
  svg.appendChild(line);
  document.body.appendChild(svg);

  // Fade out
  let opacity = 1;
  const fade = setInterval(() => {
    opacity -= 0.08;
    svg.style.opacity = opacity;
    if (opacity <= 0) { clearInterval(fade); svg.remove(); }
  }, 20);
  setTimeout(() => { clearInterval(fade); svg.remove(); }, 500);
}

// ===== EXPLOSION =====
function createExplosion(el, correct) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  const exp = document.createElement('div');
  exp.className = 'explosion';
  exp.style.cssText = `left:${cx}px; top:${cy}px;`;

  const colors = correct
    ? ['#39ff14','#ffe600','#ffffff','#00d4ff']
    : ['#ff2d78','#ff6b00','#ffaa00'];

  for (let i = 0; i < 16; i++) {
    const p = document.createElement('div');
    p.className = 'exp-particle';
    const angle = (i / 16) * Math.PI * 2;
    const dist = 60 + Math.random() * 60;
    const size = 6 + Math.random() * 10;
    const color = colors[Math.floor(Math.random() * colors.length)];
    p.style.cssText = `
      width:${size}px; height:${size}px;
      background:${color};
      box-shadow: 0 0 8px ${color};
      left:0; top:0;
      --tx:${Math.cos(angle)*dist}px;
      --ty:${Math.sin(angle)*dist}px;
      --dur:${0.4 + Math.random()*0.3}s;
    `;
    exp.appendChild(p);
  }
  document.body.appendChild(exp);
  setTimeout(() => exp.remove(), 800);
}

// ===== HANDLE SHOT =====
function handleShot(num, correct, el, pos, clickX, clickY) {
  if (!gameActive) return;
  gameActive = false;

  fireLaser(clickX, clickY);

  setTimeout(() => {
    createExplosion(el, num === correct);
    el.style.visibility = 'hidden';

    if (num === correct) {
      // CORRECT!
      score += 10 * level;
      document.getElementById('scoreDisplay').textContent = score;

      // Float score
      const floatEl = document.createElement('div');
      floatEl.className = 'float-score';
      floatEl.textContent = '+' + (10 * level);
      floatEl.style.cssText = `left:${pos.x}%; top:${pos.y}%;`;
      document.getElementById('game').appendChild(floatEl);
      setTimeout(() => floatEl.remove(), 1000);

      // Flash
      const flash = document.createElement('div');
      flash.className = 'correct-flash';
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 400);

      questionNum++;
      updateProgress();

      if (questionNum >= totalQuestions) {
        setTimeout(endGame, 800);
      } else {
        // Level up every 5 questions
        if (questionNum % 5 === 0 && questionNum > 0) {
          level++;
          document.getElementById('levelDisplay').textContent = level;
          showLevelUp();
        }
        setTimeout(nextQuestion, 900);
      }
    } else {
      // WRONG
      lives--;
      updateLives();

      // Breaking heart animation
      showBreakingHeart(() => {
        if (lives <= 0) {
          endGame();
        } else {
          el.remove();
          gameActive = true;
        }
      });
    }
  }, 200);
}

// ===== BREAKING HEART ANIMATION =====
function showBreakingHeart(onDone) {
  const container = document.getElementById('heart-container');
  const left  = document.getElementById('heart-left');
  const right = document.getElementById('heart-right');
  const whole = document.getElementById('heart-whole');

  // Reset classes
  left.className  = 'heart-half';
  right.className = 'heart-half';
  whole.className = '';
  container.classList.add('active');

  // Phase 1: appear
  whole.classList.add('heart-appear');

  // Phase 2: crack shiver
  setTimeout(() => {
    whole.classList.remove('heart-appear');
    whole.classList.add('heart-crack');
  }, 380);

  // Phase 3: split and fly
  setTimeout(() => {
    whole.classList.remove('heart-crack');
    left.classList.add('heart-break-left');
    right.classList.add('heart-break-right');
  }, 640);

  // Done
  setTimeout(() => {
    container.classList.remove('active');
    left.className  = 'heart-half';
    right.className = 'heart-half';
    whole.className = '';
    if (onDone) onDone();
  }, 1200);
}

function showLevelUp() {
  const el = document.createElement('div');
  el.className = 'level-up';
  el.innerHTML = `⭐ SEVİYE ${level} ⭐`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1500);
}

function updateLives() {
  for (let i = 1; i <= 3; i++) {
    const h = document.getElementById('h' + i);
    h.classList.toggle('lost', i > lives);
  }
}

function updateProgress() {
  const pct = (questionNum / totalQuestions) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('questionCount').textContent = `${Math.min(questionNum+1, totalQuestions)}/${totalQuestions}`;
}

// ===== NEXT QUESTION =====
function nextQuestion() {
  const q = generateQuestion();
  currentAnswer = q.answer;
  // Always show bigger number first
  const first = Math.max(q.a, q.b);
  const second = Math.min(q.a, q.b);
  document.getElementById('question-text').textContent = `${first} + ${second} = ?`;
  document.getElementById('question-hint').textContent = 'Doğru asteroiti vur! 🎯';

  const choices = generateChoices(q.answer);
  spawnAsteroids(choices, q.answer);
  gameActive = true;
}

// ===== START GAME =====
function startGame() {
  score = 0;
  lives = 3;
  questionNum = 0;
  level = 1;
  gameActive = false;

  document.getElementById('scoreDisplay').textContent = '0';
  document.getElementById('levelDisplay').textContent = '1';
  document.getElementById('questionCount').textContent = '1/10';
  document.getElementById('progress-bar').style.width = '0%';
  updateLives();

  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');

  // Clean asteroids
  asteroids.forEach(a => a.el && a.el.remove());
  asteroids = [];

  nextQuestion();
}

// ===== END GAME =====
function endGame() {
  gameActive = false;
  asteroids.forEach(a => a.el && a.el.remove());
  asteroids = [];

  const pct = score / (totalQuestions * 10 * 2);
  let stars, title, msg;

  if (lives <= 0) {
    stars = '💔💔💔';
    title = 'TEKRAR DENE!';
    msg = 'Daha iyi yapabilirsin! Tekrar dene! 💪';
  } else if (score >= totalQuestions * 10 * 2 * 0.8) {
    stars = '⭐⭐⭐';
    title = 'MUHTEŞEM!';
    msg = 'Sen gerçek bir uzay kahramanısın! 🚀🌟';
  } else if (score >= totalQuestions * 10 * 2 * 0.5) {
    stars = '⭐⭐';
    title = 'HARİKA!';
    msg = 'Çok iyi iş çıkardın! Harikasın! 🎉';
  } else {
    stars = '⭐';
    title = 'GÜZEL!';
    msg = 'İyi bir başlangıç! Tekrar dene! 😊';
  }

  document.getElementById('gameOverTitle').textContent = title;
  document.getElementById('starsDisplay').textContent = stars;
  document.getElementById('finalScore').textContent = score + ' PUAN';
  document.getElementById('gameOverMsg').textContent = msg;
  document.getElementById('gameOverScreen').classList.remove('hidden');
}

function showStart() {
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
}

// Ship always centered - no tracking needed
const ship = document.getElementById('spaceship');
ship.style.left = '50%';

document.addEventListener('DOMContentLoaded', () => {
  // Touch events are handled per-asteroid in spawnAsteroids
});
</script>
